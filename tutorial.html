    <style>
        :root {
            --primary: #1e88e5;
            --primary-dark: #004080;
            --text-color: #333333;
            --text-light: #666666;
            --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0f2fe 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .redirect-container {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 480px;
            width: 100%;
            border: 1px solid rgba(30, 136, 229, 0.1);
            position: relative;
            overflow: hidden;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .logo-img {
            height: 40px;
            object-fit: contain;
        }

        .divider {
            width: 1px;
            height: 30px;
            background: #e2e8f0;
        }

        .app-logo {
            height: 36px;
            object-fit: contain;
        }

        .visual-loader {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid rgba(255, 0, 0, 0.1);
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        .youtube-icon-wrapper {
            font-size: 40px;
            color: #ff0000;
            position: relative;
            z-index: 2;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 1.6rem;
            color: var(--primary-dark);
            margin-bottom: 12px;
            font-weight: 600;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-redirect {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #ff0000;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.2);
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .btn-redirect:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 0, 0, 0.3);
            background: #cc0000;
        }

        .btn-redirect:active {
            transform: translateY(0);
        }

        .manual-text {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 20px;
        }

        .manual-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .manual-text a:hover {
            text-decoration: underline;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }
    </style>
</head>

<body>
    <div class="redirect-container">
        <div class="logo-section">
            <img src="Photos/weblogo.png" alt="MedCortico Logo" class="logo-img">
            <div class="divider"></div>
            <img src="Photos/receptionmate-logo.png" alt="ReceptionMate Logo" class="app-logo">
        </div>

        <div class="visual-loader">
            <div class="loader-ring"></div>
            <div class="youtube-icon-wrapper">
                <i class="fab fa-youtube"></i>
            </div>
        </div>

        <h1>Redirecting to Tutorial</h1>
        <p>We are opening the latest ReceptionMate YouTube tutorial video for you.</p>

        <a href="https://www.youtube.com/watch?v=HSqLqXBHXk8" class="btn-redirect" id="redirect-link">
            <i class="fab fa-youtube"></i> Open Tutorial Now
        </a>

        <div class="manual-text">
            If you are not redirected automatically, <a href="https://www.youtube.com/watch?v=HSqLqXBHXk8">click
                here</a>.
        </div>
    </div>

    <script>
        // Redirect immediately using JavaScript replacement to avoid history loop issues
        setTimeout(function () {
            window.location.replace("https://www.youtube.com/watch?v=HSqLqXBHXk8");
        }, 1200);
    </script>
