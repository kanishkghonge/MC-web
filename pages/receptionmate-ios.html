<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Coming Soon - ReceptionMate</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="../favicon/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .coming-soon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f7ff 0%, #e0f2fe 100%);
            padding: 40px 20px;
        }
        .coming-soon-content {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
        }
        .apple-icon {
            font-size: 60px;
            color: #333;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5rem;
            color: #004080;
            margin-bottom: 15px;
        }
        p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .alternative-options {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .btn-alt {
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-android {
            background: #3ddc84;
            color: white;
            border: none;
        }
        .btn-android:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(61, 220, 132, 0.3);
            color: white;
        }
        .btn-web {
            background: #1e88e5;
            color: white;
            border: none;
        }
        .btn-web:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(30, 136, 229, 0.3);
            color: white;
        }
    </style>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="iOS Coming Soon - ReceptionMate">
    <meta property="og:description" content="With MedCortico's comprehensive Health IT Solutions, you can increase your online presence, digitalize patient records, and efficiently manage day-to-day operations.">
    <meta property="og:image" content="https://www.medcortico.com/Photos/gradient%20logo.png">
    <meta property="og:image:width" content="1024">
    <meta property="og:image:height" content="1024">
    <meta property="og:image:type" content="image/png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="iOS Coming Soon - ReceptionMate">
    <meta name="twitter:description" content="With MedCortico's comprehensive Health IT Solutions, you can increase your online presence, digitalize patient records, and efficiently manage day-to-day operations.">
    <meta name="twitter:image" content="https://www.medcortico.com/Photos/gradient%20logo.png">
</head>
<body>
    <div class="coming-soon-container">
        <div class="coming-soon-content">
            <i class="fab fa-apple apple-icon"></i>
            <h1>We're working on it!</h1>
            <p>Our ReceptionMate App for iOS is currently under development to bring you the best experience.<br><br>In the meantime, you can try it on your Android device or directly on your Browser/PC!</p>
            <div class="alternative-options">
                <a href="https://play.google.com/store/apps/details?id=com.medcortico.receptionmate&pcampaignid=web_share" class="btn-alt btn-android" target="_blank">
                    <i class="fab fa-android"></i> Get on Android
                </a>
                <a href="https://medcortico-pvt-ltd.github.io/Billing-web/" class="btn-alt btn-web" target="_blank">
                    <i class="fas fa-globe"></i> Try on Browser/PC
                </a>
            </div>
            <br>
            <a href="products.html" style="display: inline-block; margin-top: 20px; color: #1e88e5; text-decoration: none;">&larr; Back to Products</a>
        </div>
    </div>
</body>
</html>
